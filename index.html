<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<title>Erikova 30ka 🎉</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f0f0f;
    color:white;
    text-align:center;
}

header {
    padding:60px;
    background: linear-gradient(45deg,#ff0066,#ffcc00);
}
<img src="https://c.tenor.com/_hPzunPE5qYAAAAC/tenor.gif" class="gif-left">
<img src="https://c.tenor.com/_hPzunPE5qYAAAAC/tenor.gif" class="gif-right">
.section {
    padding:30px;
}

input, button {
    padding:12px;
    font-size:16px;
    border-radius:8px;
    border:none;
    margin:5px;
}

button {
    background:#ffcc00;
    cursor:pointer;
}

#countdown {
    font-size:30px;
    margin-top:20px;
}

img {
    width:150px;
    margin:10px;
    border-radius:10px;
}
    .gif-left, .gif-right {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 150px;
    z-index: 999;
}

.gif-left {
    left: 0;
}

.gif-right {
    right: 0;
}
</style>

</head>

<body>

<header>
    <h1>🎉 ERIKOVA 30KA 🎉</h1>
    <p>18.4 ob ~16:00 | Jeze 9</p>
    <div id="countdown"></div>
</header>

<!-- YOUTUBE MUSIC -->
<iframe width="0" height="0"
src="https://www.youtube.com/embed/gU-islDdn5M?autoplay=1&loop=1&playlist=gU-islDdn5M"
frameborder="0" allow="autoplay"></iframe>

<div class="section">
    <h2>✅ Potrdi udeležbo</h2>
    <input type="text" id="nameInput" placeholder="Tvoje ime">
    <button onclick="confirmAttendance()">Potrdi</button>
    <p id="status"></p>
</div>

<div class="section">
    <h2>📸 Naloži slike na dogodku</h2>
    <input type="file" id="imageUpload" multiple>
    <button onclick="uploadImages()">Upload</button>
    <div id="gallery"></div>
</div>

<script type="module">
// 🔥 FIREBASE IMPORTS
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

// 🔥 PASTE YOUR CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyDVuDeqpqBMrlbzp2KAFX5DLEBod7936Uk",
  authDomain: "ka-erik.firebaseapp.com",
  projectId: "ka-erik",
  storageBucket: "ka-erik.firebasestorage.app",
  messagingSenderId: "198402780771",
  appId: "1:198402780771:web:93fd05cd71a0c9fc9cd256"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

// COUNTDOWN
const eventDate = new Date(2026, 3, 18, 16, 0, 0).getTime();

setInterval(() => {
    const now = new Date().getTime();
    const distance = eventDate - now;

    if (distance < 0) {
        document.getElementById("countdown").innerHTML = "🎉 PARTY TIME!";
        return;
    }

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((distance / (1000 * 60)) % 60);

    document.getElementById("countdown").innerHTML =
        `⏳ ${days}d ${hours}h ${minutes}m`;
}, 1000);

// ✅ ATTENDANCE SAVE
window.confirmAttendance = async function() {
    const name = document.getElementById("nameInput").value;

    if(!name) {
        document.getElementById("status").innerText = "Vnesi ime 😄";
        return;
    }

    await addDoc(collection(db, "attendance"), {
        name: name,
        time: new Date()
    });

    document.getElementById("status").innerText =
        "👍 Shranjeno! Se vidimo!";
};

// 📸 IMAGE UPLOAD
window.uploadImages = async function() {
    const files = document.getElementById("imageUpload").files;

    for (let file of files) {
        const storageRef = ref(storage, 'images/' + file.name);

        await uploadBytes(storageRef, file);

        const url = await getDownloadURL(storageRef);

        const img = document.createElement("img");
        img.src = url;
        document.getElementById("gallery").appendChild(img);
    }
};
</script>

</body>
</html>
