<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<title>Erikova 30ka 🎉</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f0f0f;
    color:white;
    text-align:center;
}

header {
    padding:60px;
    background: linear-gradient(45deg,#ff0066,#ffcc00);
}

.section {
    padding:30px;
}

input, button {
    padding:12px;
    font-size:16px;
    border-radius:8px;
    border:none;
    margin:5px;
}

button {
    background:#ffcc00;
    cursor:pointer;
}

#countdown {
    font-size:30px;
    margin-top:20px;
}

img {
    width:150px;
    margin:10px;
    border-radius:10px;
}

/* GIF */
.gif-left, .gif-right {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 150px;
    z-index: 999;
}

.gif-left { left: 0; }
.gif-right { right: 0; }

/* GALLERY */
#gallery {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

#gallery img {
    width: 320px;
    border-radius: 15px;
    box-shadow: 0 0 25px rgba(255,255,255,0.15);
}

/* MUSIC BUTTON */
#musicBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background:#ffcc00;
    padding:15px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    z-index:1000;
}

/* ATTENDEE LIST */
#attendeeList, #pizzaResults {
    list-style: none;
    padding: 0;
}

#attendeeList li, #pizzaResults li {
    background: rgba(255,255,255,0.1);
    margin: 5px;
    padding: 10px;
    border-radius: 10px;
}

/* OVERLAY */
#finishedOverlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-size: 28px;
    z-index: 9999;
    text-align: center;
}

/* DISABLE ALL */
body.finished {
    pointer-events: none;
    user-select: none;
}
</style>

</head>

<body class="finished">

<!-- OVERLAY -->
<div id="finishedOverlay">
    <h1>🎉 FINISHED 🎉</h1>
    <p>Hvala vsem, ki ste prišli ❤️<br>Best birthday ever!</p>
</div>

<img src="https://c.tenor.com/_hPzunPE5qYAAAAC/tenor.gif" class="gif-left">
<img src="https://c.tenor.com/_hPzunPE5qYAAAAC/tenor.gif" class="gif-right">

<header>
    <h1>🎉 ERIKOVA 30KA 🎉</h1>
    <p>18.4 ob ~16:00 | Jeze 9</p>
    <div id="countdown"></div>
</header>

<audio id="bgmusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn">▶ PLAY MUSIC</button>

<div class="section">
    <h2>✅ Potrdi udeležbo</h2>
    <input type="text" placeholder="Tvoje ime">
    <button>Potrdi</button>
</div>

<div class="section">
    <h2>👥 Kdo pride</h2>
    <p>Skupaj: 🎉</p>
    <ul id="attendeeList"></ul>
</div>

<div class="section">
    <h2>🍕 Glasovanje za pico</h2>
    <button>Tuna</button>
    <button>Kmečka</button>
    <button>Mesna</button>
    <button>Klasika brez gob</button>
    <button>Pikantna</button>

    <h3>Rezultati:</h3>
    <ul id="pizzaResults"></ul>
</div>

<div class="section">
    <h2>📸 Naloži slike</h2>
    <input type="file" multiple>
    <button>Upload</button>
    <div id="gallery"></div>
</div>

<script>
// COUNTDOWN STILL WORKS (optional)
const eventDate = new Date(2026, 3, 18, 16, 0, 0).getTime();

function updateCountdown() {
  const now = new Date().getTime();
  const distance = eventDate - now;

  if (distance <= 0) {
    document.getElementById("countdown").innerHTML = "🎉 PARTY TIME!";
    return;
  }

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((distance / (1000 * 60)) % 60);

  document.getElementById("countdown").innerHTML =
    `⏳ ${days}d ${hours}h ${minutes}m`;
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>
