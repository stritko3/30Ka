<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<title>Erikova 30ka 🎉</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f0f0f;
    color:white;
    text-align:center;
}

header {
    padding:60px;
    background: linear-gradient(45deg,#ff0066,#ffcc00);
}

.section {
    padding:30px;
}

input, button {
    padding:12px;
    font-size:16px;
    border-radius:8px;
    border:none;
    margin:5px;
}

button {
    background:#ffcc00;
    cursor:pointer;
}

#countdown {
    font-size:30px;
    margin-top:20px;
}

img {
    width:150px;
    margin:10px;
    border-radius:10px;
}

/* GIF */
.gif-left, .gif-right {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 150px;
    z-index: 999;
}

.gif-left { left: 0; }
.gif-right { right: 0; }

/* GALLERY */
#gallery {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

#gallery img {
    width: 320px;
    border-radius: 15px;
    box-shadow: 0 0 25px rgba(255,255,255,0.15);
}

/* MUSIC BUTTON */
#musicBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background:#ffcc00;
    padding:15px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    z-index:1000;
}

/* ATTENDEE LIST */
#attendeeList {
    list-style: none;
    padding: 0;
}

#attendeeList li {
    background: rgba(255,255,255,0.1);
    margin: 5px;
    padding: 10px;
    border-radius: 10px;
}
</style>

</head>

<body>

<!-- GIFS -->
<img src="https://c.tenor.com/_hPzunPE5qYAAAAC/tenor.gif" class="gif-left">
<img src="https://c.tenor.com/_hPzunPE5qYAAAAC/tenor.gif" class="gif-right">

<header>
    <h1>🎉 ERIKOVA 30KA 🎉</h1>
    <p>18.4 ob ~16:00 | Jeze 9</p>
    <div id="countdown"></div>
</header>

<!-- MUSIC -->
<audio id="bgmusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn" onclick="playMusic()">▶ PLAY MUSIC</button>

<!-- ATTENDANCE -->
<div class="section">
    <h2>✅ Potrdi udeležbo</h2>
    <input type="text" id="nameInput" placeholder="Tvoje ime">
    <button onclick="confirmAttendance()">Potrdi</button>
    <p id="status"></p>
</div>

<!-- ATTENDEE LIST -->
<div class="section">
    <h2>👥 Kdo pride</h2>
    <p id="guestCount"></p>
    <ul id="attendeeList"></ul>
</div>

<!-- UPLOAD -->
<div class="section">
    <h2>📸 Naloži slike</h2>
    <input type="file" id="imageUpload" multiple>
    <button onclick="uploadImages()">Upload</button>
    <div id="gallery"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  addDoc,
  collection,
  onSnapshot,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDVuDeqpqBMrlbzp2KAFX5DLEBod7936Uk",
  authDomain: "ka-erik.firebaseapp.com",
  projectId: "ka-erik",
  storageBucket: "ka-erik.firebasestorage.app",
  messagingSenderId: "198402780771",
  appId: "1:198402780771:web:93fd05cd71a0c9fc9cd256"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// COUNTDOWN
const eventDate = new Date(2026, 3, 18, 16, 0, 0).getTime();

function updateCountdown() {
  const now = new Date().getTime();
  const distance = eventDate - now;

  if (distance <= 0) {
    document.getElementById("countdown").innerHTML = "🎉 PARTY TIME!";
    return;
  }

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((distance / (1000 * 60)) % 60);

  document.getElementById("countdown").innerHTML =
    `⏳ ${days}d ${hours}h ${minutes}m`;
}

setInterval(updateCountdown, 1000);
updateCountdown();

// ATTENDANCE
window.confirmAttendance = async function () {
  const name = document.getElementById("nameInput").value.trim();

  if (!name) {
    document.getElementById("status").innerText = "Vnesi ime 😄";
    return;
  }

  await addDoc(collection(db, "attendance"), {
    name: name,
    time: new Date()
  });

  document.getElementById("status").innerText =
    "👍 Shranjeno! Se vidimo!";
};

// ATTENDEE LIST (REALTIME)
const attendanceQuery = query(
  collection(db, "attendance"),
  orderBy("time", "asc")
);

onSnapshot(attendanceQuery, (snapshot) => {
  const list = document.getElementById("attendeeList");
  list.innerHTML = "";

  document.getElementById("guestCount").innerText =
    `Skupaj: ${snapshot.size} gostov`;

  snapshot.forEach(doc => {
    const data = doc.data();

    const li = document.createElement("li");
    li.innerText = data.name;

    list.appendChild(li);
  });
});

// CLOUDINARY
const CLOUD_NAME = "dtxokrtan";
const UPLOAD_PRESET = "party30ka";

window.uploadImages = async function () {
  const files = document.getElementById("imageUpload").files;

  for (let file of files) {

    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", UPLOAD_PRESET);

    const res = await fetch(
      `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
      {
        method: "POST",
        body: formData
      }
    );

    const data = await res.json();

    await addDoc(collection(db, "images"), {
      url: data.secure_url,
      time: new Date()
    });
  }
};

// GALLERY REALTIME
const q = query(collection(db, "images"), orderBy("time", "desc"));

onSnapshot(q, (snapshot) => {
  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  snapshot.forEach(doc => {
    const data = doc.data();

    const img = document.createElement("img");
    img.src = data.url;

    gallery.appendChild(img);
  });
});

// MUSIC
window.playMusic = function () {
  const music = document.getElementById("bgmusic");

  music.volume = 0.5;

  music.play()
    .then(() => {
      document.getElementById("musicBtn").innerText = "🎵 MUSIC ON";
    })
    .catch(() => {
      alert("Klikni še enkrat 🎵");
    });
};

</script>

</body>
</html>
